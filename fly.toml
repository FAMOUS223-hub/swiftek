# fly.toml app configuration file generated for swiftek on 2026-06-12T10:32:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'swiftek'
primary_region = 'iad'

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
