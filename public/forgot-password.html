<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — SwifTek Accessories</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-video-page">

  <video class="auth-video-bg" autoplay muted loop playsinline preload="auto">
    <source src="videos/auth-bg.mp4" type="video/mp4">
  </video>
  <div class="auth-video-overlay"></div>

  <header class="header auth-video-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">S</span>
        <span class="logo-text">Swif<span>Tek</span> Accessories</span>
      </a>
      <div class="header-actions">
        <a href="login.html" class="header-action-btn" aria-label="Sign in" title="Sign in"><i class="fas fa-sign-in-alt"></i></a>
      </div>
    </div>
  </header>

  <main class="auth-page auth-page-video">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">S</span>
      </div>

      <!-- Step 1: Email -->
      <div id="step-email">
        <h1>Forgot Password</h1>
        <p class="auth-desc">Enter your email to receive a 6-digit OTP</p>
        <form id="forgot-form">
          <div class="auth-field">
            <label for="forgot-email">Email</label>
            <input type="email" id="forgot-email" class="auth-input" placeholder="you@example.com" required autocomplete="email">
          </div>
          <p id="forgot-error" class="auth-error hidden"></p>
          <p id="forgot-success" class="auth-success hidden"></p>
          <button type="submit" id="forgot-submit-btn" class="auth-btn">Send OTP</button>
        </form>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-otp" class="hidden">
        <h1>Enter OTP</h1>
        <p class="auth-desc">A 6-digit code was sent to your email</p>

        <form id="otp-form">
          <div class="auth-field">
            <label for="otp-input">OTP Code</label>
            <input type="text" id="otp-input" class="auth-input" placeholder="000000" required maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code">
          </div>
          <p id="otp-error" class="auth-error hidden"></p>
          <p id="otp-success" class="auth-success hidden"></p>
          <button type="submit" class="auth-btn">Verify OTP</button>
        </form>
        <p class="auth-alt mt-12"><a href="#" id="resend-otp-link" class="text-sm">Resend OTP</a></p>
      </div>

      <!-- Step 3: New Password -->
      <div id="step-reset" class="hidden">
        <h1>Reset Password</h1>
        <p class="auth-desc">Choose a new password for your account</p>
        <form id="reset-form">
          <div class="auth-field">
            <label for="new-password">New Password</label>
            <div class="password-input-wrap">
              <input type="password" id="new-password" class="auth-input" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
              <button type="button" class="password-toggle" onclick="togglePassword(this)" tabindex="-1" aria-label="Toggle password visibility"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="auth-field">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-input-wrap">
              <input type="password" id="confirm-password" class="auth-input" placeholder="Repeat your password" required minlength="6" autocomplete="new-password">
              <button type="button" class="password-toggle" onclick="togglePassword(this)" tabindex="-1" aria-label="Toggle password visibility"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <p id="reset-error" class="auth-error hidden"></p>
          <p id="reset-success" class="auth-success hidden"></p>
          <button type="submit" class="auth-btn">Reset Password</button>
        </form>
      </div>

      <p class="auth-alt"><a href="login.html">Back to Login</a></p>
    </div>
  </main>

  <footer class="footer auth-footer-video">
    <div class="footer-bottom">
      <span>&copy; 2026 SwifTek. All rights reserved.</span>
      <span>Built with <i class="fas fa-heart heart-icon"></i> by Famous Tech</span>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script>
    let resetToken = null;
    let currentEmail = '';
    let otpCooldownTimer = null;

    function startCooldown(sec, link, errorEl) {
      link.textContent = `Retry in ${sec}s`;
      link.style.pointerEvents = 'none';
      link.style.opacity = '0.5';
      errorEl.textContent = `Please wait ${sec}s before requesting a new OTP.`;
      errorEl.classList.remove('hidden');
      otpCooldownTimer = setInterval(() => {
        sec--;
        if (sec <= 0) {
          clearInterval(otpCooldownTimer);
          otpCooldownTimer = null;
          link.textContent = 'Resend OTP';
          link.style.pointerEvents = '';
          link.style.opacity = '';
          errorEl.classList.add('hidden');
        } else {
          link.textContent = `Retry in ${sec}s`;
          errorEl.textContent = `Please wait ${sec}s before requesting a new OTP.`;
        }
      }, 1000);
    }

    function showStep(id) {
      clearInterval(otpCooldownTimer);
      otpCooldownTimer = null;
      const rl = document.getElementById('resend-otp-link');
      rl.textContent = 'Resend OTP';
      rl.style.pointerEvents = '';
      rl.style.opacity = '';
      const sb = document.getElementById('forgot-submit-btn');
      sb.textContent = 'Send OTP';
      sb.style.pointerEvents = '';
      sb.style.opacity = '';
      document.getElementById('step-email').classList.add('hidden');
      document.getElementById('step-otp').classList.add('hidden');
      document.getElementById('step-reset').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }
    function togglePassword(btn) {
      const input = btn.parentElement.querySelector('input');
      const icon = btn.querySelector('i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    function initTheme() {
      const saved = localStorage.getItem('swiftek_theme');
      if (saved === 'dark') document.body.classList.add('dark-theme');
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const errorEl = document.getElementById('forgot-error');
      const successEl = document.getElementById('forgot-success');
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      try {
        const result = await forgotPasswordApi(email);
        if (result.message) {
          currentEmail = email;
          showStep('step-otp');
        }
      } catch (err) {
        if (err.message) {
          const match = err.message.match(/^Please wait (\d+)s/);
          if (match) {
            startCooldown(parseInt(match[1]), document.getElementById('forgot-submit-btn'), errorEl);
          } else {
            errorEl.textContent = err.message;
            errorEl.classList.remove('hidden');
          }
        }
      }
    });

    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp-input').value.trim();
      const errorEl = document.getElementById('otp-error');
      const successEl = document.getElementById('otp-success');
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      if (!/^[0-9]{6}$/.test(otp)) {
        errorEl.textContent = 'Please enter a valid 6-digit OTP';
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        const result = await verifyResetOtpApi(currentEmail, otp);
        resetToken = result.resetToken;
        showStep('step-reset');
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });

    document.getElementById('resend-otp-link').addEventListener('click', async (e) => {
      e.preventDefault();
      if (!currentEmail) return;
      const link = e.target;
      const errorEl = document.getElementById('otp-error');
      errorEl.classList.add('hidden');
      if (otpCooldownTimer) return;
      link.textContent = 'Sending...';
      try {
        await forgotPasswordApi(currentEmail);
        link.textContent = 'Resend OTP (sent!)';
        setTimeout(() => { link.textContent = 'Resend OTP'; }, 3000);
      } catch (err) {
        if (err.message) {
          const match = err.message.match(/^Please wait (\d+)s/);
          if (match) {
            startCooldown(parseInt(match[1]), link, errorEl);
          } else {
            link.textContent = 'Resend OTP';
            errorEl.textContent = err.message;
            errorEl.classList.remove('hidden');
          }
        } else {
          link.textContent = 'Resend OTP';
        }
      }
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errorEl = document.getElementById('reset-error');
      const successEl = document.getElementById('reset-success');
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        await resetPasswordApi(resetToken, password);
        successEl.textContent = 'Password reset successfully! Redirecting...';
        successEl.classList.remove('hidden');
        document.querySelector('#step-reset button').disabled = true;
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });

    initTheme();
    (function(){var v=document.querySelector('.auth-video-bg');if(v)v.play()['catch'](function(){function t(){v.play()['catch'](function(){});document.removeEventListener('touchstart',t);document.removeEventListener('click',t);}document.addEventListener('touchstart',t,{once:true});document.addEventListener('click',t,{once:true});});})();
  </script>
</body>
</html>
